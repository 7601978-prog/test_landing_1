<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Coding — Будущее уже здесь</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 800;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }
    p {
      font-size: clamp(1rem, 3vw, 1.5rem);
      max-width: 640px;
      opacity: 0.85;
      line-height: 1.6;
      margin-bottom: 2.5rem;
    }
    .cta {
      display: inline-block;
      background: linear-gradient(90deg, #f7971e, #ffd200);
      color: #0f0c29;
      font-weight: 700;
      font-size: 1.125rem;
      padding: 1rem 2.5rem;
      border-radius: 50px;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .cta:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 30px rgba(247, 151, 30, 0.4);
    }
    .badge {
      display: inline-flex;
      gap: 0.5rem;
      align-items: center;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 0.5rem 1.25rem;
      border-radius: 50px;
      font-size: 0.875rem;
      margin-bottom: 2rem;
      backdrop-filter: blur(4px);
    }
    .badge span { color: #ffd200; font-weight: 600; }
    footer {
      margin-top: 4rem;
      font-size: 0.8rem;
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <div class="badge">⚡ Новая эра — <span>Vibe Coding 2.0</span></div>
  <h1>Пиши код<br>на своём вайбе</h1>
  <p>Забудь про синтаксис. Опиши идею — ИИ сам соберёт сайт, приложение или API. Ты просто выбираешь направление.</p>
  <a href="#" class="cta">Попробовать бесплатно →</a>
  <footer>Работает на промптах и чистом вайбе ✨</footer>
</body>
</html>
